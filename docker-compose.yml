services:

  # ─── n8n (Automation) ──────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    environment:
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n  # ย้ายมาอยู่ตรงนี้ให้ถูกต้อง
    ports:
      - "5678:5678"


  # ─── Cloudflare (Tunnel for Grafana) ───────────────────────────────────────
  # --- Tunnel สำหรับ n8n (เอาไว้รับ Webhook จาก LINE) ---
  # --- Tunnel สำหรับ n8n ---
  cf-n8n:
    image: cloudflare/cloudflared:latest
    container_name: cf-n8n
    restart: unless-stopped
    # ตัดคำว่า run ออก ให้เหลือแค่นี้ครับ
    command: tunnel --no-autoupdate --url http://n8n:5678

  # --- Tunnel สำหรับ Grafana ---
  cf-grafana:
    image: cloudflare/cloudflared:latest
    container_name: cf-grafana
    restart: unless-stopped
    # ตัดคำว่า run ออก เช่นกันครับ
    command: tunnel --no-autoupdate --url http://grafana:3000

  # ─── ngrok (Tunnel for Node-RED) ───────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=32ec4QstULKZ6tBar5D1GdN3Qz8_49R1EhQVcwF1Th7JqkzJc
    command:
      - http
      - nodered:1880
      - --domain=unmetrified-innocently-russel.ngrok-free.app

  # ─── InfluxDB (Database) ───────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin1234
      - DOCKER_INFLUXDB_INIT_ORG=myorg
      - DOCKER_INFLUXDB_INIT_BUCKET=sigfox
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # ─── Node-RED ──────────────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - TZ=Asia/Bangkok
    volumes:
      - nodered_data:/data
    depends_on:
      - influxdb

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin1234
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=kongzaza360@gmail.com
      - GF_SMTP_PASSWORD=takqyygtqkvocsgz
      - GF_SMTP_FROM_ADDRESS=kongzaza360@gmail.com
      - GF_SMTP_FROM_NAME=ระบบแจ้งเตือนน้ำท่วม-Sigfox
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb

# ─── ประกาศ Volume ทั้งหมด (กล่องเก็บของ) ──────────────────────────────────────────
volumes:
  influxdb_data:
  nodered_data:
  grafana_data:
  n8n_data:
    external: true
